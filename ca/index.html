<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Font preloads and theme-color — see index.html for the reasoning. -->
    <link rel="preload" href="/fonts/space-grotesk-latin-600-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ibm-plex-sans-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="theme-color" content="#f4efe6" />
    <!-- Keyword-first title (see index.html). Matches lang="ca" above: this
         shell is the Catalan entry point, loaded at /ca/ so Google can index it
         as its own page (see ../index.html for the Spanish default). main.ts
         still detects/toggles language at runtime; this only fixes what a
         crawler sees on first load. Keep in sync with docTitle in
         src/lib/i18n.ts. -->
    <title>Emplenar fulls de cupons precinte per a la recepta electrònica — FarmaKit</title>
    <meta
      name="description"
      content="Emplena i imprimeix la capçalera dels fulls de cupons precinte de la recepta electrònica de la teva farmàcia. Gratuït, sense registre i sense enviar dades a cap servidor."
    />
    <!-- The page is one client-rendered app; without this, /farma-kit/ca,
         /farma-kit/ca/ and /farma-kit/ca/index.html look like three pages. -->
    <link rel="canonical" href="https://nuncaeslupus.github.io/farma-kit/ca/" />

    <!-- Reciprocal hreflang — see index.html. -->
    <link rel="alternate" hreflang="es" href="https://nuncaeslupus.github.io/farma-kit/" />
    <link rel="alternate" hreflang="ca" href="https://nuncaeslupus.github.io/farma-kit/ca/" />
    <link rel="alternate" hreflang="eu" href="https://nuncaeslupus.github.io/farma-kit/eu/" />
    <link rel="alternate" hreflang="gl" href="https://nuncaeslupus.github.io/farma-kit/gl/" />
    <link rel="alternate" hreflang="x-default" href="https://nuncaeslupus.github.io/farma-kit/" />

    <!-- Link previews (WhatsApp/Telegram is how this actually gets passed around,
         and those scrapers run no JS — they read these tags, never the app).
         URLs must be absolute: scrapers don't resolve relative paths. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FarmaKit" />
    <meta property="og:url" content="https://nuncaeslupus.github.io/farma-kit/ca/" />
    <meta property="og:title" content="FarmaKit · Fulls de cupons precinte per a la recepta electrònica" />
    <meta
      property="og:description"
      content="Emplena i imprimeix la capçalera dels fulls de cupons precinte de la recepta electrònica de la teva farmàcia. Gratuït, sense registre i sense enviar dades a cap servidor."
    />
    <meta property="og:image" content="https://nuncaeslupus.github.io/farma-kit/og-card-ca.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FarmaKit — emplenador de fulls de cupons precinte" />
    <meta property="og:locale" content="ca_ES" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="eu_ES" />
    <meta property="og:locale:alternate" content="gl_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FarmaKit · Fulls de cupons precinte per a la recepta electrònica" />
    <meta
      name="twitter:description"
      content="Emplena la capçalera dels fulls de cupons precinte de la recepta electrònica. Gratuït, sense registre i sense enviar dades."
    />
    <meta name="twitter:image" content="https://nuncaeslupus.github.io/farma-kit/og-card-ca.png" />

    <!-- Structured data — data blocks, never executed, so the meta-CSP below
         doesn't apply. Keep the FAQPage text in sync with the visible .about
         section at the bottom of <body>. See index.html. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FarmaKit",
        "alternateName": "Emplenador de fulls de cupons precinte",
        "url": "https://nuncaeslupus.github.io/farma-kit/ca/",
        "image": "https://nuncaeslupus.github.io/farma-kit/og-card-ca.png",
        "description": "Eina gratuïta per a farmàcies: emplena i imprimeix la capçalera dels fulls de cupons precinte de la recepta electrònica (UP, mes i any, numeració i segell del titular). El PDF es genera al navegador, sense enviar dades a cap servidor.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requereix JavaScript",
        "inLanguage": ["ca", "es", "eu", "gl"],
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
        "audience": { "@type": "Audience", "audienceType": "Farmacèutics i oficines de farmàcia" },
        "license": "https://github.com/nuncaeslupus/farma-kit/blob/main/LICENSE",
        "sameAs": ["https://github.com/nuncaeslupus/farma-kit"]
      }
    </script>

    <!-- Meta-CSP as defense in depth: GitHub Pages serves static files and can't
         set response headers, so this is the only way to ship a CSP at all. Now
         that fonts are self-hosted (see src/styles/fonts.css), everything the app
         needs is same-origin. style-src keeps 'unsafe-inline' because Lit writes
         inline styles. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />

    <!-- Render-blocking so it applies before app.css (which Vite injects via JS in
         dev): while <fk-root> is still empty, reserve a viewport so the static
         about/FAQ below it stays off-screen instead of flashing, unstyled, at the
         top. Once Lit fills fk-root it is no longer :empty and this rule is inert
         (no permanent gap). -->
    <style>fk-root:empty{display:block;min-height:100vh}</style>
  </head>
  <body>
    <fk-root></fk-root>
    <!-- Static about/FAQ — see index.html for the reasoning. Catalan here to
         match this shell; the runtime toggle re-translates it via data-i18n.
         Keep in sync with the seo* keys in src/lib/i18n.ts and the FAQPage
         JSON-LD in <head>. -->
    <!-- Real text for crawlers that don't run JS (Google does; most others don't).
         It lives in <noscript> deliberately: Lit renders fk-root in LIGHT DOM and
         does NOT clear pre-existing children, so the same markup placed inside
         fk-root would stay on screen underneath the app. Verified. -->
    <noscript>
      <h1>FarmaKit — Emplenador de fulls de cupons precinte</h1>
      <p>
        Utilitat gratuïta per emplenar la capçalera dels fulls de cupons precinte (talonaris de
        receptes) d'una farmàcia: UP, mes i any, numeració dels fulls i les dades del segell del
        titular. Genera un PDF llest per imprimir sobre els fulls oficials del Col·legi de
        Farmacèutics.
      </p>
      <p>
        Necessita JavaScript, perquè el document es genera al teu propi navegador: les teves dades
        no s'envien a cap servidor. Disponible en català, castellà, basc i gallec.
      </p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
