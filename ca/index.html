<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Matches lang="ca" above: this shell is the Catalan entry point, loaded
         at /ca/ so Google can index it as its own page (see ../index.html for
         the Spanish default). main.ts still detects/toggles language at
         runtime; this only fixes what a crawler sees on first load. -->
    <title>Farma-Kit - Emplenador de fulls de cupons precinte</title>
    <meta
      name="description"
      content="Emplena la capçalera dels fulls de cupons precinte per a la recepta electrònica. Gratuït, sense registre i sense enviar dades: tot es processa al teu navegador."
    />
    <!-- The page is one client-rendered app; without this, /farma-kit/ca,
         /farma-kit/ca/ and /farma-kit/ca/index.html look like three pages. -->
    <link rel="canonical" href="https://nuncaeslupus.github.io/farma-kit/ca/" />

    <!-- Reciprocal hreflang — see index.html. -->
    <link rel="alternate" hreflang="es" href="https://nuncaeslupus.github.io/farma-kit/" />
    <link rel="alternate" hreflang="ca" href="https://nuncaeslupus.github.io/farma-kit/ca/" />
    <link rel="alternate" hreflang="x-default" href="https://nuncaeslupus.github.io/farma-kit/" />

    <!-- Link previews (WhatsApp/Telegram is how this actually gets passed around,
         and those scrapers run no JS — they read these tags, never the app).
         URLs must be absolute: scrapers don't resolve relative paths. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Farma-Kit" />
    <meta property="og:url" content="https://nuncaeslupus.github.io/farma-kit/ca/" />
    <meta property="og:title" content="Farma-Kit · Emplenador de fulls de cupons precinte" />
    <meta
      property="og:description"
      content="Emplena la capçalera dels fulls de cupons precinte per a la recepta electrònica. Gratuït, sense registre i sense enviar dades: tot es processa al teu navegador."
    />
    <meta property="og:image" content="https://nuncaeslupus.github.io/farma-kit/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Farma-Kit — emplenador de fulls de cupons precinte" />
    <meta property="og:locale" content="ca_ES" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Farma-Kit · Emplenador de fulls de cupons precinte" />
    <meta
      name="twitter:description"
      content="Emplena la capçalera dels fulls de cupons precinte per a la recepta electrònica. Gratuït, sense registre i sense enviar dades."
    />
    <meta name="twitter:image" content="https://nuncaeslupus.github.io/farma-kit/og-card.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <fk-root></fk-root>
    <!-- Real text for crawlers that don't run JS (Google does; most others don't).
         It lives in <noscript> deliberately: Lit renders fk-root in LIGHT DOM and
         does NOT clear pre-existing children, so the same markup placed inside
         fk-root would stay on screen underneath the app. Verified. -->
    <noscript>
      <h1>Farma-Kit — Emplenador de fulls de cupons precinte</h1>
      <p>
        Utilitat gratuïta per emplenar la capçalera dels fulls de cupons precinte (talonaris de
        receptes) d'una farmàcia: UP, mes i any, numeració dels fulls i les dades del segell del
        titular. Genera un PDF llest per imprimir sobre els fulls oficials del Col·legi de
        Farmacèutics.
      </p>
      <p>
        Necessita JavaScript, perquè el document es genera al teu propi navegador: les teves dades
        no s'envien a cap servidor. Disponible en català i castellà.
      </p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
